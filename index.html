<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DuitLabs Demos</title>
<style>
:root {
  --bg: #0F1520;
  --surface: #16202E;
  --border: #243044;
  --text: #E8EDF4;
  --text-dim: #4A6280;
  --accent: #e07f1c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  max-width: 500px;
  width: 100%;
}
.logo {
  text-align: center;
  margin-bottom: 32px;
}
.logo h1 {
  font-size: 28px;
  font-weight: 700;
}
.logo h1 span { color: var(--accent); }
.logo p {
  color: var(--text-dim);
  font-size: 14px;
  margin-top: 4px;
}
.demos {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.demo-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 24px;
  text-decoration: none;
  color: var(--text);
  transition: all 0.15s;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.demo-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
}
.demo-info h2 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 4px;
}
.demo-info p {
  font-size: 13px;
  color: var(--text-dim);
}
.demo-arrow {
  color: var(--text-dim);
  font-size: 20px;
}
.demo-card:hover .demo-arrow {
  color: var(--accent);
}
.version {
  font-size: 11px;
  color: var(--text-dim);
  background: var(--bg);
  padding: 2px 8px;
  border-radius: 4px;
  margin-left: 8px;
}
footer {
  text-align: center;
  margin-top: 40px;
  font-size: 12px;
  color: var(--text-dim);
}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>Duit<span>Labs</span></h1>
    <p>Product Demos</p>
  </div>
  
  <div class="demos">
    <a href="./cortex/" class="demo-card">
      <div class="demo-info">
        <h2>Cortex Data Monitor <span class="version">v1.3.1</span></h2>
        <p>Enterprise supplier analytics dashboard</p>
      </div>
      <span class="demo-arrow">→</span>
    </a>

    <a href="./app-switcher/" class="demo-card">
      <div class="demo-info">
        <h2>App Switcher <span class="version">v1.1</span></h2>
        <p>Navigation component to change apps</p>
      </div>
      <span class="demo-arrow">→</span>
    </a>

    
    <!-- Add more demos here as cards -->
    
  </div>
  
  <footer>
    Contact team for demo access credentials
  </footer>
</div>
</body>
</html>
